name: V12 Auto-Bash
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Command Hetzner to Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 46.62.209.177
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /root/diamond-app/deploy.sh
